# Sanitized example for local operator setup.
# Safe to version-control: replace emails and OAuth paths in your local, untracked config.

[database]
path = "data/account-main/inbox_vault_account-main.db"
password_env = "INBOX_VAULT_DB_PASSWORD"

[gmail]
query = "newer_than:30d (label:inbox OR label:sent)"
# optional override used by `repair --backfill-limit` historical walk;
# defaults to gmail.query with time filters (newer_than/after/before/older_than)
# stripped automatically.
# idle_backfill_query = "label:inbox OR label:sent"
# legacy setting retained for compatibility; update no longer performs idle
# backfill. Prefer explicit `repair --backfill-limit N` runs.
# idle_backfill_limit = 10

[llm]
enabled = true
endpoint = "http://localhost:8080"
model = "local-model"
timeout_seconds = 60

[embeddings]
endpoint = "http://localhost:8080"
model = "local-embedding-model"
timeout_seconds = 4
max_retries = 0
backoff_base_seconds = 0.5
backoff_max_seconds = 8
fallback = "none"
fallback_dim = 256

[redaction]
# hybrid | model | regex
mode = "hybrid"
profile = "standard"
instruction = ""
chunk_chars = 1200

[retrieval]
# dense | lexical | hybrid
search_strategy = "hybrid"
# sqlite | lancedb
vector_backend = "sqlite"
# fts5 | none
lexical_backend = "fts5"
lancedb_path = "data/account-main/lancedb"
lancedb_table = "message_chunk_vectors"
rrf_k = 60
dense_candidate_k = 100
lexical_candidate_k = 100
chunk_chars = 900
chunk_overlap_chars = 150

[rerank]
enabled = false
model = "cross-encoder/ms-marco-MiniLM-L-6-v2"
top_n = 20

[indexing]
max_index_chars = 3000
auto_index_after_ingest = true
auto_index_pending_only = true
auto_index_limit = 300

[profiles]
deep_context_max_threads = 8
deep_context_max_messages = 36
deep_context_max_chars = 18000
gog_history_enabled = false
gog_history_account = "operator@example.com"
gog_history_command = "gog"
gog_history_max_messages = 8
gog_history_timeout_seconds = 15

[[accounts]]
name = "account-main"
email = "operator@example.com"
credentials_file = "env/local/credentials.json"
token_file = "env/local/token_main.json"

[[accounts]]
name = "account-alt"
email = "operator+alt@example.com"
credentials_file = "env/local/credentials.json"
token_file = "env/local/token_alt.json"
