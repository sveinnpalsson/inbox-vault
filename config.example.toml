[database]
path = "data/inbox_vault.db"
password_env = "INBOX_VAULT_DB_PASSWORD"

[gmail]
query = "label:inbox OR label:sent"
# optional override used by `repair --backfill-limit` historical walk;
# defaults to gmail.query with time filters (newer_than/after/before/older_than)
# stripped automatically.
# idle_backfill_query = "label:inbox OR label:sent"
# legacy setting retained for compatibility; update no longer performs idle
# backfill. Prefer explicit `repair --backfill-limit N` runs.
# idle_backfill_limit = 200
# Gmail API request timeout (seconds) for list/get/history/profile calls.
request_timeout_seconds = 60
# Emit privacy-safe ingest progress every N scanned/processed messages.
progress_every = 100
# Keep attachment handling metadata-only during normal update runs by default.
# Enable if you want Inbox Vault to fetch and store attachment bytes locally.
materialize_attachments_on_update = false
# Keep repair metadata-only by default as well; use `materialize-attachments`
# later if you want to backfill stored attachment bytes.
materialize_attachments_on_repair = false

[llm]
enabled = true
endpoint = "http://localhost:8080"
model = "local-model"
timeout_seconds = 60

[embeddings]
endpoint = "http://localhost:8080"
model = "local-embedding-model"
timeout_seconds = 60
# retry behavior for intermittent local endpoint failures
max_retries = 4
backoff_base_seconds = 0.5
backoff_max_seconds = 8
# fallback behavior when endpoint is unavailable after retries
# none (fail) | hash (deterministic placeholder vectors -- not recommended)
fallback = "none"
# dimension for hash fallback vectors (only relevant when fallback = "hash")
fallback_dim = 256

[redaction]
# hybrid (default) | model | regex
mode = "hybrid"
# named clearance profile passed to the local redaction model prompt
profile = "standard"
# optional extra prompt instruction for model/hybrid modes
instruction = ""
# chunk size for model redaction requests
chunk_chars = 1200
# optional model override for redaction calls (defaults to [llm].model)
# model = "local-redaction-model"

[retrieval]
# dense | lexical | hybrid
search_strategy = "hybrid"
# fts5 | none
lexical_backend = "fts5"
rrf_k = 60
dense_candidate_k = 100
lexical_candidate_k = 100
# chunk-level dense indexing settings
chunk_chars = 900
chunk_overlap_chars = 150

[indexing]
# only index messages that match at least one include label (set [] to disable include filter)
include_labels = ["INBOX", "SENT"]
# skip noisy/junk categories before expensive redaction + embedding
exclude_labels = ["SPAM", "TRASH", "CATEGORY_PROMOTIONS", "CATEGORY_SOCIAL", "CATEGORY_FORUMS"]
# lightweight quality cleanup for indexed text
strip_zero_width = true
collapse_whitespace = true
# trim subject/snippet/body per field to avoid indexing long boilerplate tails
max_index_chars = 20000
# auto-run vector indexing at end of `backfill` / `update`
auto_index_after_ingest = false
# when auto indexing is enabled, default to pending-only rows
auto_index_pending_only = true
# optional cap for auto indexing pass; omit for full pending set
auto_index_limit = 300

[rerank]
enabled = false
model = "cross-encoder/ms-marco-MiniLM-L-6-v2"
top_n = 20

[profiles]
# Deep-tier profile context expansion caps (thread-aware)
deep_context_max_threads = 8
deep_context_max_messages = 36
deep_context_max_chars = 18000
# Optional Gog CLI augmentation for deep-tier profile context (bounded)
gog_history_enabled = false
gog_history_account = ""
gog_history_command = "gog"
gog_history_max_messages = 8
gog_history_timeout_seconds = 15

[ingest_triage]
# disabled (default) | observe | enforce
# observe: store diagnostics only
# enforce: only apply safe light downgrades; full fetch/storage still happens
enabled = false
# observe | enforce
mode = "observe"

[[accounts]]
name = "main"
email = "you@gmail.com"
credentials_file = "env/credentials.json"
token_file = "env/token_main.json"
